<html>
  <head>
    <title>Learn position</title>
    <style>
      .one {
        width: 800px;
        height: 150px;
        position: static;
        top: 200px;
        left: 200px;
        text-align: center;
        font-size: 100px;
        background-color: rgb(203, 42, 42);
      }
      .two {
        width: 800px;
        height: 150px;
        text-align: center;
        font-size: 100px;
        background-color: rgb(108, 108, 68);
      }
      .three {
        width: 800px;
        height: 150px;
        /*position: fixed;*/
        position: sticky;
        top: 10px;
        text-align: center;
        font-size: 100px;
        background-color: rgb(34, 236, 236);
      }
      .four {
        width: 800px;
        height: 150px;
        text-align: center;
        font-size: 100px;
        background-color: rgb(115, 115, 87);
      }
      .five {
        width: 800px;
        height: 150px;
        text-align: center;
        font-size: 100px;
        background-color: rgb(121, 121, 151);
      }
      .six {
        width: 800px;
        height: 150px;
        text-align: center;
        font-size: 100px;
        background-color: rgb(170, 19, 19);
      }
    </style>
  </head>
  <body>
    <div class="one">1</div>
    <div class="two">2</div>
    <div class="three">3</div>
    <div class="four">4</div>
    <div class="five">5</div>
    <div class="six">6</div>
  </body>
</html>
