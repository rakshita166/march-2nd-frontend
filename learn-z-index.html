<html>
  <head>
    <title>Learn z index</title>
    <style>
      .one {
        width: 200px;
        height: 100px;
        position: relative;
        top: 50px;
        z-index: 1;
        border: 2px solid black;
        background-color: rgb(96, 230, 185);
      }
      .two {
        width: 200px;
        height: 100px;
        position: relative;

        z-index: 2;

        border: 2px solid black;
        background-color: rgb(163, 68, 163);
      }
    </style>
  </head>
  <body>
    <div class="one"></div>
    <span class="two"></span>
  </body>
</html>
