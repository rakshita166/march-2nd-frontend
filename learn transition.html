<html>
  <head>
    <title>learn transition</title>
    <style>
      .one {
        height: 400px;
        width: 400px;
        background-color: aqua;
        transition-property: width;
        transition-duration: 2s;
      }
      .one:hover {
        width: 600px;
      }
    </style>
  </head>
  <body>
    <div class="one"></div>
  </body>
</html>
