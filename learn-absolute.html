<html>
  <head>
    <title>learn absolute</title>

    <style>
      .section {
        width: 800px;
        height: 400px;
        position: relative;

        border: 2px solid black;
        background-color: blue;
      }
      .sub-section {
        width: 300px;
        height: 100px;
        position: absolute;
        top: 80px;
        right: 0px;
        border: 2px solid black;
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <div class="section">
      <div class="sub-section"></div>
    </div>
  </body>
</html>
