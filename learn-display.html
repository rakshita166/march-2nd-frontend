<html>
  <head>
    <title>Learn display</title>
    <style>
      .one {
        background-color: yellow;
        display: inline;
      }
      .two {
        background-color: violet;
        display: block;
      }
    </style>
    <body>
      <div class="one">Text one</div>
      <span class="two">Text two</span>
    </body>
  </head>
</html>
