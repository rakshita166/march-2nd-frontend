<html>
  <head>
    <title>learn-grid</title>
    <style>
      .one {
        height: 400px;
        width: auto;
        background-color: aquamarine;
        text-align: center;
        font-size: 200px;
      }
      .two {
        height: 400px;
        width: autox;
        background-color: brown;
        text-align: center;
        font-size: 200px;
      }
      .three {
        height: 400px;
        width: auto;
        background-color: bisque;
        text-align: center;
        font-size: 200px;
      }
      .four {
        height: 400px;
        width: auto;
        background-color: blueviolet;
        text-align: center;
        font-size: 200px;
      }
      .main {
        display: grid;
        grid-template-columns: /*auto auto auto*/ 30% 70%;
      }
    </style>
    <body>
      <div class="main">
        <div class="one">1</div>
        <div class="two">2</div>
        <div class="three">3</div>
        <div class="four">4</div>
      </div>
    </body>
  </head>
</html>
